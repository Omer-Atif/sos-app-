workflows:
  flutter-android-workflow:
    name: Guardian SOS Android Build
    instance_type: mac_mini_m1
    max_build_duration: 60
    environment:
      flutter: stable
    scripts:
      - name: Install dependencies
        script: |
          cd flutter_project && flutter packages pub get
      - name: Build Android APK
        script: |
          cd flutter_project && flutter build apk --release
    artifacts:
      - flutter_project/build/app/outputs/flutter-apk/app-release.apk
    publishing:
      email:
        recipients:
          - omeratif06@gmail.com
